<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div align="center" class="border">
        <div class="header">
            <h1 class="word">Login</h1>
        </div>
        <h2 class="word">
            <form action="/login" method="post">
                <div class="msg">{{msg}}</div>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    class="textbox"
                /><br /><br />
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    class="textbox"
                /><br /><br />
                <input type="submit" value="Log In" class="btn" /><br /><br />
            </form>
        </h2>
        <p class="bottom">
            Don't have an account? <a href="/register" class="button">Sign Up</a>
        </p>
    </div>
</body>
</html>
