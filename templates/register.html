<html>
<head>
<title>Register Page</title>
<link rel="stylesheet" type="text/css" href="/static/style.css" />
</head>

<body>
<div align="center" class="border">
    <div class="header">
        <h1 class="word">Register</h1>
    </div>

    <h2 class="word">
        <form action="/register" method="post">
            <div class="msg">{{msg}}</div>

            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                class="textbox"
            /><br /><br />

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                class="textbox"
            /><br /><br />

            <input
                type="text"
                id="email"
                name="email"
                placeholder="Enter your email"
                class="textbox"
            /><br /><br />

             <input type="submit" value="Sign up" class="btn" /><br /><br />
            </form>
        </h2>
        <p class="bottom">
            Already have an account? <a href="/login" class="button">Sign In</a>
        </p>
    </div>
</body>
</html>
